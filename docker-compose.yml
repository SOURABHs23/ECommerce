version: '3.8'

# Reads variables from backend/.env automatically
env_file:
  - backend/.env

services:
  # ──────────────── PostgreSQL Database ────────────────
  db:
    image: postgres:16-alpine
    container_name: ecommerce-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────── Spring Boot Backend ────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Override DB_URL to point to Docker container instead of localhost
      DB_URL: jdbc:postgresql://db:5432/ecommerce
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      # CORS: allow requests from Nginx frontend
      APP_CORS_ALLOWED-ORIGINS: http://localhost,http://frontend
    ports:
      - "8080:8080"

  # ──────────────── Angular Frontend (Nginx) ────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecommerce-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
    driver: local
