services:
  # ──────────────── PostgreSQL Database ────────────────
  db:
    image: postgres:16-alpine
    container_name: ecommerce-db
    restart: unless-stopped
    env_file:
      - backend/.env
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────── Spring Boot Backend ────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - backend/.env
    environment:
      # Override DB_URL to point to Docker container instead of localhost
      DB_URL: jdbc:postgresql://db:5432/ecommerce
    ports:
      - "8080:8080"

  # ──────────────── Angular Frontend (Nginx) ────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecommerce-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
    driver: local
