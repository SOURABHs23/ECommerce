# ============================================
# COMMON CONFIGURATION (all environments)
# ============================================

# Default active profile (override via CLI, env var, or IDE)
spring.profiles.active=dev

# Server Configuration
server.port=8080

# JPA Common Settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt.expiration=3600000

# Email Configuration (Gmail SMTP - common settings)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Kafka Serialization/Deserialization (common across environments)
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=notification-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.ecommerce.notification.event

# OTP Configuration
otp.expiration.seconds=30

# Pagination Limits
spring.data.web.pageable.max-page-size=50
