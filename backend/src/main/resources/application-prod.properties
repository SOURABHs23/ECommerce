# ============================================
# PROD ENVIRONMENT CONFIGURATION
# ============================================

# PostgreSQL (from environment variables)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# JWT (from environment variable)
jwt.secret=${JWT_SECRET}

# Email Credentials (from environment variables)
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}

# Kafka (production broker)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Twilio (from environment variables)
twilio.account.sid=${TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN}
twilio.phone.number=${TWILIO_PHONE_NUMBER}

# Logging (minimal for production)
logging.level.com.ecommerce=INFO
logging.level.org.springframework.security=WARN

# CORS (production domain - UPDATE THIS)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://yourdomain.com}
